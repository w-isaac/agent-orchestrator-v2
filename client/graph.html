<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Context Graph - Agent Orchestrator</title>
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/graph.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header class="navbar">
    <div class="navbar-brand">Agent Orchestrator</div>
    <nav aria-label="Primary navigation">
      <ul class="nav-links">
        <li><a href="/">Dashboard</a></li>
        <li><a href="/stories">Stories</a></li>
        <li><a href="/agents">Agents</a></li>
        <li><a href="/graph.html" class="active">Graph</a></li>
        <li><a href="/settings">Settings</a></li>
      </ul>
    </nav>
  </header>
  <main id="main-content" class="graph-main">
    <div class="graph-container" id="graph-container">
      <!-- Loading state -->
      <div class="graph-state" id="graph-loading">
        <div class="spinner"></div>
        <p>Loading graph...</p>
      </div>
      <!-- Empty state -->
      <div class="graph-state hidden" id="graph-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M8 12h8M12 8v8"/>
        </svg>
        <p>No graph data available</p>
      </div>
      <!-- Error state -->
      <div class="graph-state hidden" id="graph-error">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <p id="error-message">Failed to load graph</p>
        <button class="btn btn-primary" id="retry-btn">Retry</button>
      </div>
      <!-- SVG canvas (hidden until populated) -->
      <svg id="graph-svg" class="hidden"></svg>
      <!-- Toolbar -->
      <div class="graph-toolbar hidden" id="graph-toolbar">
        <button class="toolbar-btn" id="zoom-in" title="Zoom in">+</button>
        <button class="toolbar-btn" id="zoom-out" title="Zoom out">&minus;</button>
        <button class="toolbar-btn" id="zoom-reset" title="Reset zoom">&#8634;</button>
      </div>
      <!-- Legend -->
      <div class="graph-legend hidden" id="graph-legend">
        <div class="legend-item">
          <svg width="16" height="16"><circle cx="8" cy="8" r="7" fill="#4F8EF7" stroke="#2563EB" stroke-width="1.5"/></svg>
          <span>Artifact</span>
        </div>
        <div class="legend-item">
          <svg width="16" height="16"><rect x="1" y="1" width="14" height="14" rx="3" fill="#22C55E" stroke="#16A34A" stroke-width="1.5"/></svg>
          <span>Task</span>
        </div>
        <div class="legend-item">
          <svg width="16" height="16"><rect x="2" y="2" width="11" height="11" rx="1" fill="#F59E0B" stroke="#D97706" stroke-width="1.5" transform="rotate(45 8 8)"/></svg>
          <span>Context</span>
        </div>
      </div>
      <!-- Edge tooltip -->
      <div class="edge-tooltip hidden" id="edge-tooltip"></div>
    </div>
    <!-- Project selector -->
    <div class="graph-controls">
      <label for="project-select">Project:</label>
      <select id="project-select"><option value="">Select a project...</option></select>
    </div>
  </main>
  <script src="/js/node-edit-modal.js"></script>
  <script src="/js/edge-edit-modal.js"></script>
  <script src="/js/graph-drag-edge.js"></script>
  <script src="/js/error-toast.js"></script>
  <script src="/js/optimistic-graph.js"></script>
  <script src="/js/force-graph.js"></script>
</body>
</html>
